services:
  postgres:
    image: postgres:16
    container_name: whisperlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: whisper_user
      POSTGRES_PASSWORD: whisper_password
      POSTGRES_DB: whisperlink_v2
    ports:
      - "5434:5432"
    volumes:
      - whisperlink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisper_user -d whisperlink_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: whisperlink-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - whisperlink_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: whisperlink-worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://whisper_user:whisper_password@postgres:5432/whisperlink_v2?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      GROQ_API_KEY: ${GROQ_API_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  whisperlink_postgres_data:
  whisperlink_redis_data: